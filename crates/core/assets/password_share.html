<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Protected Share — Bytehive</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --slate-1: #111113;
                --slate-2: #18191b;
                --slate-3: #212225;
                --slate-6: #363a3f;
                --slate-9: #696e77;
                --slate-11: #b0b4ba;
                --slate-12: #edeef0;
                --bh-hi: #ffac1c;
                --bh-lo: #ff8a1c;
                --bh-soft: #ffc266;
                --bh-wash: #2a1d12;
                --bh-ring: #a65f24;
                --tomato-9: #e54d2e;
                --grad-sun: linear-gradient(135deg, var(--bh-hi), var(--bh-lo));
                --bg: var(--slate-1);
                --sf: var(--slate-2);
                --sf2: var(--slate-3);
                --bd: var(--slate-6);
                --text: var(--slate-12);
                --muted: var(--slate-9);
                --lo: var(--slate-11);
                --a: var(--bh-hi);
                --danger: var(--tomato-9);
                --sans: "Geist", system-ui, sans-serif;
                --mono: "Geist Mono", ui-monospace, monospace;
                --r: 0;
                --r2: 0;
                --tr: 90ms ease;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            b,
            strong {
                font-weight: 500;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: var(--sans);
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 1rem;
            }
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                opacity: 0.03;
                background-image:
                    linear-gradient(var(--bd) 1px, transparent 1px),
                    linear-gradient(90deg, var(--bd) 1px, transparent 1px);
                background-size: 28px 28px;
            }
            .card {
                position: relative;
                z-index: 1;
                background: var(--sf);
                border: 1px solid var(--bd);
                border-radius: var(--r2);
                padding: 0;
                width: 340px;
                max-width: 100%;
                overflow: hidden;
            }
            .card-head {
                background: var(--sf2);
                border-bottom: 1px solid var(--bd);
                padding: 0.8rem 1.5rem;
                display: flex;
                align-items: center;
                gap: 0.55rem;
            }
            .card-head .hdr-logo-img {
                height: 1.05rem;
                width: auto;
                display: block;
                flex-shrink: 0;
            }
            .card-head-title {
                font-size: 0.85rem;
                font-weight: 500;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--text);
            }
            .card-body {
                padding: 1.5rem;
            }
            h2 {
                text-align: center;
                font-size: 0.95rem;
                font-weight: 500;
                margin-bottom: 1.2rem;
                color: var(--text);
            }
            label {
                display: block;
                font-size: 0.63rem;
                text-transform: uppercase;
                letter-spacing: 0.09em;
                color: var(--muted);
                margin-bottom: 0.3rem;
                font-family: var(--mono);
            }
            input[type="password"] {
                width: 100%;
                background: var(--sf2);
                border: 1px solid var(--bd);
                color: var(--text);
                padding: 0.6rem 0.75rem;
                border-radius: var(--r);
                font-family: var(--mono);
                font-size: 0.84rem;
                transition:
                    border-color var(--tr),
                    background var(--tr);
                /* Touch-friendly */
                min-height: 40px;
                -webkit-appearance: none;
            }
            input[type="password"]:focus {
                outline: none;
                border-color: var(--bh-ring);
                background: var(--bh-wash);
                box-shadow: inset 0 0 0 1px rgba(255, 172, 28, 0.28);
            }
            input::placeholder {
                color: var(--muted);
            }
            button {
                width: 100%;
                margin-top: 0.85rem;
                padding: 0.7rem;
                border-radius: var(--r);
                border: none;
                background: var(--grad-sun);
                color: var(--slate-1);
                font-weight: 500;
                cursor: pointer;
                font-size: 0.88rem;
                font-family: var(--sans);
                transition:
                    opacity var(--tr),
                    filter var(--tr);
                /* Touch-friendly */
                min-height: 44px;
                -webkit-tap-highlight-color: transparent;
            }
            button:hover {
                opacity: 1;
                filter: brightness(1.04);
            }
            .err {
                color: var(--bh-hi);
                font-size: 0.76rem;
                text-align: center;
                margin-top: 0.75rem;
                font-family: var(--mono);
            }
            a {
                color: var(--bh-hi);
                text-decoration: none;
                display: block;
                text-align: center;
                margin-top: 1.1rem;
                font-size: 0.76rem;
                opacity: 0.75;
                transition: opacity var(--tr);
                /* Touch-friendly */
                padding: 0.35rem 0;
            }
            a:hover {
                opacity: 1;
            }

            @media (max-width: 400px) {
                .card-body {
                    padding: 1.1rem;
                }
                .card-head {
                    padding: 0.7rem 1.1rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="card-head">
                <img
                    class="hdr-logo-img"
                    src="bytehive-logo-full.svg"
                    alt="Bytehive"
                    width="262"
                    height="58"
                />
                <div class="card-head-title">Protected</div>
            </div>
            <div class="card-body">
                <h2>Password Required</h2>
                <form method="post" action="/s/{token}">
                    <label>Password</label>
                    <input
                        type="password"
                        name="password"
                        autofocus
                        placeholder="Enter password"
                        autocomplete="current-password"
                    />
                    <button type="submit">Access File</button>
                </form>
                {err}
                <a href="/">← Go home</a>
            </div>
        </div>
    </body>
</html>
