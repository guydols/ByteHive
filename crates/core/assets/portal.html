<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Bytehive</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --slate-1: #111113;
                --slate-2: #18191b;
                --slate-3: #212225;
                --slate-4: #272a2d;
                --slate-5: #2e3135;
                --slate-6: #363a3f;
                --slate-7: #43484e;
                --slate-8: #5a6169;
                --slate-9: #696e77;
                --slate-10: #777b84;
                --slate-11: #b0b4ba;
                --slate-12: #edeef0;
                --bh-hi: #ffac1c;
                --bh-lo: #ff8a1c;
                --bh-soft: #ffc266;
                --bh-on-tint: #ffecd9;
                --bh-wash: #2a1d12;
                --bh-ring: #a65f24;
                --tomato-9: #e54d2e;
                --tomato-11: #ff977d;
                --amber-11: #ffca16;
                --amber-12: #ffe7b3;
                --grad-sun: linear-gradient(135deg, var(--bh-hi), var(--bh-lo));
                --grad-sun-strong: linear-gradient(
                    135deg,
                    #ffc14d,
                    var(--bh-hi),
                    var(--bh-lo)
                );
                --bg: var(--slate-1);
                --sf: var(--slate-2);
                --sf2: var(--slate-3);
                --sf3: var(--slate-4);
                --bd: var(--slate-6);
                --bd2: var(--slate-7);
                --text: var(--slate-12);
                --lo: var(--slate-11);
                --muted: var(--slate-9);
                --a: var(--bh-hi);
                --a-glow: rgba(255, 172, 28, 0.2);
                --a2: var(--bh-lo);
                --danger: var(--tomato-9);
                --warn: var(--amber-11);
                --sans: "Geist", system-ui, sans-serif;
                --mono: "Geist Mono", ui-monospace, monospace;
                --r: 0;
                --r2: 0;
                --tr: 90ms ease;
                --sw: 220px;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            b,
            strong {
                font-weight: 500;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: var(--sans);
                overflow: hidden;
            }
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: var(--slate-2);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--slate-7);
                border: 2px solid var(--slate-2);
            }
            ::-webkit-scrollbar-thumb:hover {
                background: var(--slate-8);
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(7px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            .dot {
                width: 7px;
                height: 7px;
                border-radius: var(--r);
                flex-shrink: 0;
                display: inline-block;
            }
            .dot.running {
                background: var(--grad-sun);
                box-shadow:
                    0 0 0 1px var(--slate-1),
                    0 0 10px rgba(255, 172, 28, 0.45);
            }
            .dot.stopped {
                background: var(--danger);
            }
            .dot.failed {
                background: var(--warn);
                animation: pulse 1.8s ease infinite;
            }

            /* ── Login screen ── */
            #login-screen {
                position: fixed;
                inset: 0;
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
                padding: 1rem;
            }
            #login-screen::before {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                background:
                    radial-gradient(
                        ellipse 60% 50% at 18% 18%,
                        rgba(255, 172, 28, 0.07) 0%,
                        transparent 62%
                    ),
                    radial-gradient(
                        ellipse 50% 45% at 84% 80%,
                        rgba(255, 138, 28, 0.06) 0%,
                        transparent 62%
                    );
            }
            #login-screen::after {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                opacity: 0.03;
                background-image:
                    linear-gradient(var(--bd) 1px, transparent 1px),
                    linear-gradient(90deg, var(--bd) 1px, transparent 1px);
                background-size: 32px 32px;
            }
            .login-card {
                position: relative;
                z-index: 1;
                background: var(--sf);
                border: 1px solid var(--bd);
                border-radius: var(--r2);
                padding: 0;
                width: 370px;
                max-width: 100%;
                animation: fadeUp 0.35s ease both;
                box-shadow:
                    0 0 0 1px rgba(255, 172, 28, 0.06),
                    0 24px 64px rgba(0, 0, 0, 0.55);
                overflow: hidden;
            }
            .login-card-header {
                background: var(--sf2);
                border-bottom: 1px solid var(--bd);
                padding: 0.9rem 1.6rem;
                display: flex;
                align-items: center;
                gap: 0.65rem;
            }
            .login-card-header .hdr-logo-img {
                height: 1.55rem;
                width: auto;
                display: block;
                flex-shrink: 0;
            }
            .login-body {
                padding: 1.75rem 1.6rem 1.5rem;
            }
            .login-sub {
                font-size: 0.68rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 1.5rem;
                font-family: var(--mono);
            }
            .lfield {
                margin-bottom: 0.95rem;
            }
            .lfield label {
                display: block;
                font-size: 0.63rem;
                text-transform: uppercase;
                letter-spacing: 0.09em;
                color: var(--muted);
                margin-bottom: 0.3rem;
                font-family: var(--mono);
            }
            .lfield input {
                width: 100%;
                padding: 0.6rem 0.75rem;
                border-radius: var(--r);
                background: var(--sf2);
                border: 1px solid var(--bd);
                color: var(--text);
                font-family: var(--mono);
                font-size: 0.84rem;
                transition:
                    border-color var(--tr),
                    background var(--tr);
                min-height: 42px;
                -webkit-appearance: none;
            }
            .lfield input:focus {
                outline: none;
                border-color: var(--bh-ring);
                background: var(--bh-wash);
                box-shadow: inset 0 0 0 1px rgba(255, 172, 28, 0.28);
            }
            .lfield input::placeholder {
                color: var(--muted);
            }
            .btn-login {
                width: 100%;
                margin-top: 0.3rem;
                padding: 0.68rem;
                border-radius: var(--r);
                border: none;
                cursor: pointer;
                font-family: var(--sans);
                font-size: 0.88rem;
                font-weight: 500;
                background: var(--grad-sun);
                color: var(--slate-1);
                transition:
                    opacity var(--tr),
                    filter var(--tr);
                min-height: 44px;
                -webkit-tap-highlight-color: transparent;
            }
            .btn-login:hover:not(:disabled) {
                opacity: 1;
                filter: brightness(1.04);
            }
            .btn-login:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }
            .login-err {
                min-height: 1.1em;
                font-size: 0.75rem;
                color: var(--bh-hi);
                text-align: center;
                margin-top: 0.8rem;
                font-family: var(--mono);
            }

            /* ── Shell ── */
            #shell {
                display: none;
                height: 100vh;
            }
            #shell.visible {
                display: flex;
                animation: fadeIn 0.2s ease;
            }

            /* ── Sidebar overlay (mobile) ── */
            #sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.55);
                z-index: 599;
                animation: fadeIn 0.15s ease;
            }
            #sidebar-overlay.visible {
                display: block;
            }

            /* ── Sidebar ── */
            #sidebar {
                width: var(--sw);
                flex-shrink: 0;
                background: var(--sf);
                border-right: 1px solid var(--bd);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                transition: transform 0.25s ease;
            }
            .sb-head {
                background: var(--sf2);
                border-bottom: 1px solid var(--bd);
                padding: 0.75rem 0.9rem;
                display: flex;
                align-items: center;
                gap: 0.55rem;
                flex-shrink: 0;
            }
            /* Hamburger — hidden on desktop */
            #menu-btn {
                display: none;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                background: none;
                border: 1px solid var(--bd);
                color: var(--lo);
                border-radius: var(--r);
                cursor: pointer;
                font-size: 1.1rem;
                line-height: 1;
                flex-shrink: 0;
                transition:
                    color var(--tr),
                    border-color var(--tr),
                    background var(--tr);
                -webkit-tap-highlight-color: transparent;
            }
            #menu-btn:hover {
                color: var(--text);
                border-color: var(--bd2);
                background: var(--sf3);
            }
            .sb-logo-mark {
                display: flex;
                align-items: center;
                min-width: 0;
            }
            .sb-logo-mark .hdr-logo-img {
                height: 1.05rem;
                width: auto;
                display: block;
                flex-shrink: 0;
            }
            .sb-wordmark {
                font-family: var(--sans);
                font-size: 0.82rem;
                font-weight: 500;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--text);
            }
            .sb-identity {
                padding: 0.6rem 0.9rem 0.55rem;
                border-bottom: 1px solid var(--bd);
                flex-shrink: 0;
                background: var(--sf);
            }
            .sb-user-name {
                font-size: 0.82rem;
                font-weight: 500;
                color: var(--text);
                line-height: 1.25;
            }
            .sb-user-role {
                display: inline-block;
                font-size: 0.6rem;
                font-family: var(--mono);
                text-transform: uppercase;
                letter-spacing: 0.07em;
                padding: 0.09rem 0.38rem;
                border-radius: var(--r);
                margin-top: 0.22rem;
                font-weight: 500;
            }
            .sb-user-role.admin {
                background: rgba(255, 172, 28, 0.14);
                color: var(--bh-hi);
                border: 1px solid rgba(255, 172, 28, 0.38);
            }
            .sb-user-role.user {
                background: rgba(176, 180, 186, 0.1);
                color: var(--slate-11);
                border: 1px solid var(--slate-6);
            }
            .sb-user-role.other {
                background: rgba(105, 110, 119, 0.14);
                color: var(--slate-11);
                border: 1px solid var(--slate-7);
            }
            .sb-section-label {
                padding: 0.65rem 0.9rem 0.22rem;
                font-size: 0.58rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--muted);
                font-family: var(--mono);
                flex-shrink: 0;
            }
            #nav-items {
                flex: 1;
                overflow-y: auto;
                padding: 0.1rem 0;
            }
            .nav-item {
                display: flex;
                align-items: center;
                gap: 0.48rem;
                padding: 0.55rem 0.9rem;
                cursor: pointer;
                font-size: 0.8rem;
                color: var(--lo);
                transition:
                    background var(--tr),
                    color var(--tr),
                    border-color var(--tr);
                border-left: 3px solid transparent;
                text-decoration: none;
                position: relative;
                -webkit-tap-highlight-color: transparent;
            }
            .nav-item:hover {
                background: var(--sf2);
                color: var(--text);
            }
            .nav-item.active {
                background: var(--sf2);
                color: var(--bh-hi);
                border-left-color: var(--bh-lo);
            }
            .nav-item.unavailable {
                opacity: 0.28;
                pointer-events: none;
            }
            .nav-icon {
                font-size: 0.88rem;
                flex-shrink: 0;
                width: 1.1rem;
                text-align: center;
            }
            .nav-label {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                flex: 1;
            }
            .nav-count {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 1.3rem;
                height: 1.3rem;
                padding: 0 0.28rem;
                border-radius: var(--r);
                font-size: 0.6rem;
                font-weight: 500;
                font-family: var(--mono);
                flex-shrink: 0;
            }
            .nav-count.accent {
                background: var(--grad-sun);
                color: var(--slate-1);
            }
            .nav-count.danger {
                background: var(--danger);
                color: #fff;
            }
            .nav-count.warn {
                background: var(--warn);
                color: #1a0d00;
            }
            .nav-count.neutral {
                background: var(--sf3);
                color: var(--lo);
                border: 1px solid var(--bd);
            }
            .sb-divider {
                height: 1px;
                background: var(--bd);
                margin: 0.25rem 0.7rem;
            }
            .sb-bottom {
                flex-shrink: 0;
                border-top: 1px solid var(--bd);
                padding: 0.3rem 0;
            }
            .btn-signout {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                width: 100%;
                padding: 0.55rem 0.9rem;
                background: none;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-family: var(--sans);
                font-size: 0.78rem;
                transition:
                    color var(--tr),
                    background var(--tr);
                -webkit-tap-highlight-color: transparent;
            }
            .btn-signout:hover {
                color: var(--danger);
                background: rgba(229, 77, 46, 0.08);
            }

            /* ── App frame ── */
            #app-frame-wrap {
                flex: 1;
                position: relative;
                overflow: hidden;
                background: var(--bg);
            }
            #app-frame {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                border: none;
                background: var(--bg);
            }
            #welcome-pane {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 0.65rem;
                color: var(--muted);
                pointer-events: none;
                animation: fadeUp 0.4s ease;
            }
            #welcome-pane .w-logo-full {
                display: block;
                width: min(11rem, 72vw);
                height: auto;
                opacity: 0.32;
                flex-shrink: 0;
            }
            #welcome-pane p {
                font-size: 0.8rem;
                color: var(--muted);
                text-align: center;
                max-width: 230px;
                line-height: 1.65;
            }
            #welcome-pane.hidden {
                display: none;
            }

            /* ── Mobile top bar (shown instead of inline sidebar) ── */
            #mobile-topbar {
                display: none;
                background: var(--sf);
                border-bottom: 1px solid var(--bd);
                padding: 0 0.85rem;
                height: 48px;
                align-items: center;
                gap: 0.65rem;
                flex-shrink: 0;
                z-index: 10;
            }
            #mobile-topbar .hdr-logo-img {
                height: 1.1rem;
                width: auto;
                display: block;
            }
            #mobile-topbar .spacer {
                flex: 1;
            }
            #mobile-topbar-menu-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                background: none;
                border: 1px solid var(--bd);
                color: var(--lo);
                border-radius: var(--r);
                cursor: pointer;
                font-size: 1.2rem;
                line-height: 1;
                transition:
                    color var(--tr),
                    border-color var(--tr),
                    background var(--tr);
                -webkit-tap-highlight-color: transparent;
            }
            #mobile-topbar-menu-btn:hover {
                color: var(--text);
                border-color: var(--bd2);
                background: var(--sf3);
            }

            /* ── Responsive ── */
            @media (max-width: 768px) {
                #shell.visible {
                    flex-direction: column;
                }
                #mobile-topbar {
                    display: flex;
                }
                #sidebar {
                    position: fixed;
                    top: 0;
                    left: 0;
                    height: 100%;
                    z-index: 600;
                    width: min(var(--sw), 85vw);
                    transform: translateX(-110%);
                    box-shadow: none;
                }
                #sidebar.mobile-open {
                    transform: translateX(0);
                    box-shadow: 6px 0 32px rgba(0, 0, 0, 0.55);
                }
                #app-frame-wrap {
                    flex: 1;
                }
                /* Larger tap targets in nav */
                .nav-item {
                    padding: 0.7rem 0.9rem;
                }
            }

            @media (max-width: 480px) {
                .login-body {
                    padding: 1.25rem 1.1rem 1.1rem;
                }
                .login-card-header {
                    padding: 0.75rem 1.1rem;
                }
            }
        </style>
    </head>
    <body>
        <!-- Login screen -->
        <div id="login-screen">
            <div class="login-card">
                <div class="login-card-header">
                    <img
                        class="hdr-logo-img"
                        src="bytehive-logo-full.svg"
                        alt="Bytehive"
                        width="262"
                        height="58"
                    />
                </div>
                <div class="login-body">
                    <div class="login-sub">Sign in to your account</div>
                    <div class="lfield">
                        <label>Username</label>
                        <input
                            type="text"
                            id="inp-user"
                            autocomplete="username"
                            placeholder="username"
                            onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()"
                        />
                    </div>
                    <div class="lfield">
                        <label>Password</label>
                        <input
                            type="password"
                            id="inp-pass"
                            autocomplete="current-password"
                            placeholder="••••••••"
                            onkeydown="if(event.key==='Enter')doLogin()"
                        />
                    </div>
                    <button
                        class="btn-login"
                        id="btn-login"
                        onclick="doLogin()"
                    >
                        Sign In
                    </button>
                    <div class="login-err" id="login-err"></div>
                </div>
            </div>
        </div>

        <!-- Sidebar overlay (mobile) -->
        <div id="sidebar-overlay"></div>

        <!-- Shell -->
        <div id="shell">
            <!-- Mobile top bar -->
            <div id="mobile-topbar">
                <img
                    class="hdr-logo-img"
                    src="bytehive-logo-full.svg"
                    alt="Bytehive"
                    width="262"
                    height="58"
                />
                <div class="spacer"></div>
                <button
                    id="mobile-topbar-menu-btn"
                    onclick="toggleSidebar()"
                    aria-label="Open menu"
                    aria-expanded="false"
                >
                    ☰
                </button>
            </div>

            <div id="sidebar">
                <div class="sb-head">
                    <div class="sb-logo-mark">
                        <img
                            class="hdr-logo-img"
                            src="bytehive-logo-full.svg"
                            alt="Bytehive"
                            width="262"
                            height="58"
                        />
                    </div>
                    <div class="sb-wordmark">Apps</div>
                </div>
                <div class="sb-identity">
                    <div class="sb-user-name" id="sb-name">—</div>
                    <div class="sb-user-role" id="sb-role">—</div>
                </div>
                <div class="sb-section-label">Navigation</div>
                <div id="nav-items"></div>
                <div class="sb-bottom">
                    <div id="sb-admin-link" style="display: none">
                        <div class="sb-divider"></div>
                        <div
                            class="nav-item"
                            id="nav-admin"
                            onclick="navTo('/admin')"
                        >
                            <span class="nav-icon">⚙</span>
                            <span class="nav-label">Ops Dashboard</span>
                        </div>
                    </div>
                    <div class="sb-divider"></div>
                    <button class="btn-signout" onclick="doSignOut()">
                        <span class="nav-icon">↩</span>Sign out
                    </button>
                </div>
            </div>

            <div id="app-frame-wrap">
                <div id="welcome-pane">
                    <div class="w-icon" aria-hidden="true">
                        <img
                            class="w-logo-full"
                            src="bytehive-logo-full.svg"
                            alt=""
                            width="262"
                            height="58"
                        />
                    </div>
                    <p>Select an application<br />from the sidebar.</p>
                </div>
                <iframe
                    id="app-frame"
                    src="about:blank"
                    title="Application"
                ></iframe>
            </div>
        </div>

        <script>
            let currentUser = null,
                activeNav = null;

            /* ── Mobile sidebar ── */
            function toggleSidebar() {
                const sb = document.getElementById("sidebar");
                const ov = document.getElementById("sidebar-overlay");
                const btn = document.getElementById("mobile-topbar-menu-btn");
                const isOpen = sb.classList.toggle("mobile-open");
                ov.classList.toggle("visible", isOpen);
                if (btn) btn.setAttribute("aria-expanded", String(isOpen));
            }
            function closeSidebar() {
                const sb = document.getElementById("sidebar");
                const ov = document.getElementById("sidebar-overlay");
                const btn = document.getElementById("mobile-topbar-menu-btn");
                sb.classList.remove("mobile-open");
                ov.classList.remove("visible");
                if (btn) btn.setAttribute("aria-expanded", "false");
            }
            document
                .getElementById("sidebar-overlay")
                .addEventListener("click", closeSidebar);

            /* ── Auth ── */
            (async function init() {
                const redirectTo = new URLSearchParams(location.search).get(
                    "redirect",
                );
                try {
                    const r = await fetch("/api/auth/me");
                    if (r.ok) {
                        const d = await r.json();
                        if (d.ok) {
                            currentUser = d.user;
                            showShell();
                            await loadNav();
                            if (redirectTo)
                                navTo(decodeURIComponent(redirectTo));
                            return;
                        }
                    }
                } catch (_) {}
                showLogin(redirectTo ? "Please sign in to continue." : "");
            })();

            function showLogin(msg) {
                document.getElementById("login-screen").style.display = "flex";
                document.getElementById("shell").classList.remove("visible");
                if (msg) document.getElementById("login-err").textContent = msg;
            }

            async function doLogin() {
                const btn = document.getElementById("btn-login");
                const user = document.getElementById("inp-user").value.trim();
                const pass = document.getElementById("inp-pass").value;
                const errEl = document.getElementById("login-err");
                if (!user) {
                    errEl.textContent = "Enter your username.";
                    return;
                }
                btn.disabled = true;
                btn.textContent = "Signing in…";
                errEl.textContent = "";
                try {
                    const r = await fetch("/api/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: user,
                            password: pass,
                        }),
                    });
                    const d = await r.json();
                    if (d.ok) {
                        currentUser = d.user;
                        showShell();
                        await loadNav();
                        const rd = new URLSearchParams(location.search).get(
                            "redirect",
                        );
                        if (rd) navTo(decodeURIComponent(rd));
                    } else errEl.textContent = d.error || "Login failed.";
                } catch (e) {
                    errEl.textContent = "Could not reach server.";
                }
                btn.disabled = false;
                btn.textContent = "Sign In";
            }

            async function doSignOut() {
                await fetch("/api/auth/logout", { method: "POST" }).catch(
                    () => {},
                );
                currentUser = null;
                activeNav = null;
                document.getElementById("inp-user").value = "";
                document.getElementById("inp-pass").value = "";
                document.getElementById("app-frame").src = "about:blank";
                document
                    .getElementById("welcome-pane")
                    .classList.remove("hidden");
                document.getElementById("login-err").textContent = "";
                closeSidebar();
                showLogin("");
            }

            function showShell() {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("shell").classList.add("visible");
                document.getElementById("sb-name").textContent =
                    currentUser.display_name;
                const grps = currentUser.groups || [];
                const isAdmin = grps.includes("admin");
                const topGroup = isAdmin
                    ? "admin"
                    : grps.includes("user")
                      ? "user"
                      : "other";
                const r = document.getElementById("sb-role");
                r.textContent = grps.length ? grps.join(", ") : "(no groups)";
                r.className = "sb-user-role " + topGroup;
                document.getElementById("sb-admin-link").style.display =
                    isAdmin ? "block" : "none";
            }

            async function loadNav() {
                const nav = document.getElementById("nav-items");
                try {
                    const r = await fetch("/api/core/status");
                    if (!r.ok) {
                        nav.innerHTML =
                            '<div style="padding:.5rem .9rem;font-size:.73rem;color:var(--muted)">Could not load apps</div>';
                        return;
                    }
                    const d = await r.json();
                    const apps = (d.apps || []).filter((a) => a.show_in_nav);
                    if (!apps.length) {
                        nav.innerHTML =
                            '<div style="padding:.5rem .9rem;font-size:.73rem;color:var(--muted)">No apps configured</div>';
                        return;
                    }
                    nav.innerHTML = apps
                        .map((a) => {
                            const active = activeNav === a.ui_prefix;
                            const ok = a.status === "running";
                            return `<div class="nav-item${active ? " active" : ""} ${ok ? "" : "unavailable"}"
                   data-href="${a.ui_prefix}" onclick="navTo('${a.ui_prefix}')"
                   title="${a.description}">
        <span class="nav-icon">${a.nav_icon || "⬡"}</span>
        <span class="nav-label">${a.nav_label || a.name}</span>
        <span class="dot ${a.status}"></span>
      </div>`;
                        })
                        .join("");
                } catch (e) {
                    nav.innerHTML = `<div style="padding:.5rem .9rem;font-size:.73rem;color:var(--muted)">Error: ${e.message}</div>`;
                }
            }

            function navTo(url) {
                activeNav = url;
                document.querySelectorAll(".nav-item").forEach((el) => {
                    el.classList.toggle(
                        "active",
                        el.dataset.href === url ||
                            (el.id === "nav-admin" && url === "/admin"),
                    );
                });
                document.getElementById("welcome-pane").classList.add("hidden");
                document.getElementById("app-frame").src = url;
                // Close sidebar on mobile after navigation
                closeSidebar();
            }

            setInterval(() => {
                if (currentUser) loadNav();
            }, 30000);
        </script>
    </body>
</html>
